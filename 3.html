<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio3</title>

<style>
  body {
    font-family: Arial;
    padding: 20px;
  }

  select {
    font-size: 36px;
  }

  audio, iframe {
    display: block;
    margin-top: 15px;
    height: 40px;
    border: none;
  }
</style>
</head>

<body>

<select id="radioSelect" onchange="playSelected()">
  <option value="">-- Elige una radio --</option>
  <option value="audio|http://stream.zeno.fm/97gyvgz7kyvtv">Wonder 80s</option>
  <option value="iframe|https://italo.live-streams.nl:8000/stream">Italo Disco</option>
  <option value="iframe|https://mscp2.live-streams.nl:8152/italodance">Italo Dance</option>
  <option value="iframe|https://mediaserv38.live-streams.nl:18030/stream">Synthetic FM</option>
  <option value="iframe|https://s2.radio.co/s9ecef4f68/listen">La Retro</option>
  <option value="iframe|https://167.86.86.4:8000/stream">Radio Kemonia</option>
</select>

<audio id="audioPlayer" controls></audio>
<iframe id="iframePlayer" width="300"></iframe>

<script>
const audio = document.getElementById("audioPlayer");
const iframe = document.getElementById("iframePlayer");

function stopAll() {
  audio.pause();
  audio.src = "";
  iframe.src = "";
}

function playSelected() {
  stopAll();

  const value = document.getElementById("radioSelect").value;
  if (!value) return;

  const [type, url] = value.split("|");

  if (type === "audio") {
    audio.src = url;
    audio.play();
  } else {
    iframe.src = url;
  }
}
</script>

</body>
</html>
